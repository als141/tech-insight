name: tech-insight-e2e

x-backend-image: &backend-image
  build:
    context: .
    dockerfile: backend/Dockerfile
  image: tech-insight-backend:e2e

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: techinsight
      POSTGRES_USER: techinsight
      POSTGRES_PASSWORD: techinsight
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techinsight -d techinsight"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - e2e-postgres-data:/var/lib/postgresql/data

  backend:
    <<: *backend-image
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: techinsight
      POSTGRES_USER: techinsight
      POSTGRES_PASSWORD: techinsight
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      EMBEDDING_PROVIDER: qwen
      SEARCH_DEFAULT_MODE: hybrid

  e2e:
    <<: *backend-image
    depends_on:
      backend:
        condition: service_started
    environment:
      E2E_API_BASE_URL: http://backend:8000/api/v1
      E2E_EXPECTED_INITIAL_TOTAL: 1000
    command: [".venv/bin/python", "tests/e2e/crud_api.py"]

volumes:
  e2e-postgres-data:
