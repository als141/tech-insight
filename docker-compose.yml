services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-techinsight}
      POSTGRES_USER: ${POSTGRES_USER:-techinsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techinsight}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-techinsight} -d ${POSTGRES_DB:-techinsight}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./database/postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-techinsight}
      POSTGRES_USER: ${POSTGRES_USER:-techinsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techinsight}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-qwen}
      SEARCH_DEFAULT_MODE: ${SEARCH_DEFAULT_MODE:-hybrid}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./database/vector-cache:/app/database/vector-cache

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_started
    environment:
      INTERNAL_API_BASE_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
